<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathra AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#6366F1',
            dark: '#1F2937',
            light: '#F3F4F6'
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .shadow-custom { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
      .shadow-custom-lg { box-shadow: 0 4px 20px rgba(79, 70, 229, 0.15); }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen font-inter text-gray-800">
  
  <div class="container max-w-2xl mx-auto px-4 py-6 h-screen flex flex-col">
    
    <!-- Header -->
    <header class="mb-6 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary text-white mb-4 shadow-custom-lg">
        <i class="fa fa-robot text-3xl"></i>
      </div>
      <h1 class="text-[clamp(1.8rem,5vw,2.3rem)] font-bold text-gray-800 mb-1">Nathra AI</h1>
      <p class="text-gray-500 text-sm">Asisten cerdas untuk menjawab pertanyaan Anda</p>
    </header>

    <!-- Kotak Chat -->
    <div id="chatBox" class="flex-1 overflow-y-auto scrollbar-hide bg-white rounded-3xl shadow-custom p-5 mb-5 space-y-5 border border-gray-100">
      
      <!-- Pesan Awal -->
      <div class="flex gap-3 max-w-[85%]">
        <div class="w-9 h-9 rounded-full bg-primary text-white flex items-center justify-center flex-shrink-0 mt-0.5 shadow-sm">
          <i class="fa fa-robot"></i>
        </div>
        <div class="bg-gray-50 rounded-2xl rounded-tl-none p-4 shadow-sm">
          <div class="flex items-center gap-2 mb-2">
            <span class="font-semibold text-sm text-primary">Nathra AI</span>
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
            <span class="text-xs text-gray-400">Online</span>
          </div>
          <p class="text-sm leading-relaxed">Halo. Ada yang bisa saya bantu? Silakan sampaikan pertanyaan Anda dengan jelas.</p>
        </div>
      </div>

    </div>

    <!-- Input -->
    <div class="relative">
      <div class="absolute inset-y-0 left-4 flex items-center text-gray-400">
        <i class="fa fa-comment-o text-lg"></i>
      </div>
      <input 
        id="userInput" 
        type="text" 
        placeholder="Ketik pesan Anda di sini..." 
        class="w-full pl-12 pr-14 py-4 rounded-xl border border-gray-200 shadow-sm focus:ring-1 focus:ring-primary focus:border-primary focus:outline-none transition bg-white text-sm"
      >
      <button 
        onclick="kirimPesan()" 
        class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 rounded-lg bg-primary text-white flex items-center justify-center hover:bg-primary/90 transition-all duration-200 shadow-sm"
      >
        <i class="fa fa-paper-plane"></i>
      </button>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">© 2026 Nathra AI • Semua Hak Dilindungi</p>

  </div>

  <script>
    async function kirimPesan() {
      const input = document.getElementById('userInput');
      const pesan = input.value.trim();
      if (!pesan) return;

      tambahPesan('Anda', pesan, true);
      input.value = '';

      const idStatus = tambahStatus();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pesan })
        });
        const data = await res.json();
        gantiStatusJawaban(idStatus, data.jawaban);

      } catch {
        gantiStatusJawaban(idStatus, 'Terjadi gangguan. Silakan coba lagi nanti.');
      }
    }

    function tambahPesan(pengirim, teks, isUser=false) {
      const chatBox = document.getElementById('chatBox');
      const div = document.createElement('div');
      
      if (isUser) {
        // Pesan Pengguna
        div.className = "flex gap-3 max-w-[85%] ml-auto flex-row-reverse";
        div.innerHTML = `
          <div class="w-9 h-9 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center flex-shrink-0 mt-0.5 shadow-sm">
            <i class="fa fa-user"></i>
          </div>
          <div class="bg-indigo-50 rounded-2xl rounded-tr-none p-4 shadow-sm">
            <div class="flex items-center gap-2 mb-2 justify-end">
              <span class="text-xs text-gray-400">Anda</span>
              <span class="font-semibold text-sm text-gray-700"></span>
            </div>
            <p class="text-sm leading-relaxed">${teks.replace(/\n/g, '<br>')}</p>
          </div>
        `;
      } else {
        // Pesan Bot
        div.className = "flex gap-3 max-w-[85%]";
        div.innerHTML = `
          <div class="w-9 h-9 rounded-full bg-primary text-white flex items-center justify-center flex-shrink-0 mt-0.5 shadow-sm">
            <i class="fa fa-robot"></i>
          </div>
          <div class="bg-gray-50 rounded-2xl rounded-tl-none p-4 shadow-sm">
            <div class="flex items-center gap-2 mb-2">
              <span class="font-semibold text-sm text-primary">Nathra AI</span>
              <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
            </div>
            <p class="text-sm leading-relaxed">${teks.replace(/\n/g, '<br>')}</p>
          </div>
        `;
      }

      chatBox.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return div;
    }

    function tambahStatus() {
      const chatBox = document.getElementById('chatBox');
      const id = 'status-' + Date.now();
      const div = document.createElement('div');
      div.id = id;
      div.className = "flex gap-3 max-w-[85%]";
      div.innerHTML = `
        <div class="w-9 h-9 rounded-full bg-primary text-white flex items-center justify-center flex-shrink-0 mt-0.5 shadow-sm">
          <i class="fa fa-robot"></i>
        </div>
        <div class="bg-gray-50 rounded-2xl rounded-tl-none p-4 shadow-sm">
          <div class="flex items-center gap-2 mb-2">
            <span class="font-semibold text-sm text-primary">Nathra AI</span>
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
          </div>
          <div class="flex gap-1.5 items-center h-6">
            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
          </div>
        </div>
      `;
      chatBox.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return id;
    }

    function gantiStatusJawaban(id, teks) {
      const elemen = document.getElementById(id);
      if (!elemen) return;
      
      elemen.innerHTML = `
        <div class="w-9 h-9 rounded-full bg-primary text-white flex items-center justify-center flex-shrink-0 mt-0.5 shadow-sm">
          <i class="fa fa-robot"></i>
        </div>
        <div class="bg-gray-50 rounded-2xl rounded-tl-none p-4 shadow-sm">
          <div class="flex items-center gap-2 mb-2">
            <span class="font-semibold text-sm text-primary">Nathra AI</span>
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
          </div>
          <p class="text-sm leading-relaxed">${teks.replace(/\n/g, '<br>')}</p>
        </div>
      `;
    }

    document.getElementById('userInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') kirimPesan();
    });
  </script>
</body>
        </html>
