<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathra AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#6366F1',
            dark: '#1F2937',
            light: '#F3F4F6'
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .shadow-custom { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen font-inter text-gray-800">
  
  <div class="container max-w-2xl mx-auto px-4 py-6 h-screen flex flex-col">
    
    <!-- Header -->
    <header class="mb-6 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-primary text-white mb-3 shadow-custom">
        <i class="fa fa-robot text-2xl"></i>
      </div>
      <h1 class="text-[clamp(1.6rem,4vw,2.2rem)] font-bold text-gray-800 mb-1">Nathra AI</h1>
      <p class="text-gray-500 text-sm">Asisten cerdas untuk menjawab pertanyaan Anda</p>
    </header>

    <!-- Kotak Chat -->
    <div id="chatBox" class="flex-1 overflow-y-auto scrollbar-hide bg-white rounded-2xl shadow-custom p-4 mb-5 space-y-4 border border-gray-100">
      
      <!-- Pesan Awal -->
      <div class="flex gap-3 max-w-[85%]">
        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center flex-shrink-0 mt-0.5">
          <i class="fa fa-robot text-sm"></i>
        </div>
        <div class="bg-gray-50 rounded-xl rounded-tl-none p-3.5">
          <p class="font-medium text-sm mb-1">Nathra AI</p>
          <p class="text-sm">Halo. Ada yang bisa saya bantu? Silakan sampaikan pertanyaan Anda.</p>
        </div>
      </div>

    </div>

    <!-- Input -->
    <div class="relative">
      <div class="absolute inset-y-0 left-3 flex items-center text-gray-400">
        <i class="fa fa-comment-o"></i>
      </div>
      <input 
        id="userInput" 
        type="text" 
        placeholder="Ketik pesan..." 
        class="w-full pl-9 pr-12 py-3 rounded-lg border border-gray-200 shadow-sm focus:ring-1 focus:ring-primary focus:border-primary focus:outline-none transition bg-white text-sm"
      >
      <button 
        onclick="kirimPesan()" 
        class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 rounded-lg bg-primary text-white flex items-center justify-center hover:bg-primary/90 transition"
      >
        <i class="fa fa-paper-plane"></i>
      </button>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">© 2026 Nathra AI</p>

  </div>

  <script>
    async function kirimPesan() {
      const input = document.getElementById('userInput');
      const pesan = input.value.trim();
      if (!pesan) return;

      tambahPesan('Anda', pesan, true);
      input.value = '';

      const idStatus = tambahStatus();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pesan })
        });
        const data = await res.json();
        gantiStatusJawaban(idStatus, data.jawaban);

      } catch {
        gantiStatusJawaban(idStatus, 'Terjadi gangguan. Silakan coba lagi nanti.');
      }
    }

    function tambahPesan(pengirim, teks, isUser = false) {
      const chatBox = document.getElementById('chatBox');
      const div = document.createElement('div');
      
      if (isUser) {
        div.className = "flex gap-3 max-w-[85%] ml-auto flex-row-reverse";
        div.innerHTML = `
          <div class="w-8 h-8 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center flex-shrink-0 mt-0.5">
            <i class="fa fa-user text-sm"></i>
          </div>
          <div class="bg-indigo-50 rounded-xl rounded-tr-none p-3.5">
            <p class="font-medium text-sm mb-1">${pengirim}</p>
            <p class="text-sm">${teks.replace(/\n/g, '<br>')}</p>
          </div>
        `;
      } else {
        div.className = "flex gap-3 max-w-[85%]";
        div.innerHTML = `
          <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center flex-shrink-0 mt-0.5">
            <i class="fa fa-robot text-sm"></i>
          </div>
          <div class="bg-gray-50 rounded-xl rounded-tl-none p-3.5">
            <p class="font-medium text-sm mb-1">${pengirim}</p>
            <p class="text-sm">${teks.replace(/\n/g, '<br>')}</p>
          </div>
        `;
      }

      chatBox.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return div;
    }

    function tambahStatus() {
      const chatBox = document.getElementById('chatBox');
      const id = 'status-' + Date.now();
      const div = document.createElement('div');
      div.id = id;
      div.className = "flex gap-3 max-w-[85%]";
      div.innerHTML = `
        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center flex-shrink-0 mt-0.5">
          <i class="fa fa-robot text-sm"></i>
        </div>
        <div class="bg-gray-50 rounded-xl rounded-tl-none p-3.5">
          <p class="font-medium text-sm mb-1">Nathra AI</p>
          <div class="flex gap-1 items-center h-5">
            <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
            <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
            <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
          </div>
        </div>
      `;
      chatBox.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return id;
    }

    function gantiStatusJawaban(id, teks) {
      const elemen = document.getElementById(id);
      if (!elemen) return;
      
      elemen.innerHTML = `
        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center flex-shrink-0 mt-0.5">
          <i class="fa fa-robot text-sm"></i>
        </div>
        <div class="bg-gray-50 rounded-xl rounded-tl-none p-3.5">
          <p class="font-medium text-sm mb-1">Nathra AI</p>
          <p class="text-sm">${teks.replace(/\n/g, '<br>')}</p>
        </div>
      `;
    }

    document.getElementById('userInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') kirimPesan();
    });
  </script>
</body>
</html>
